<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>貨物追蹤查詢 - 專業版</title>

<style>
body {
    font-family: "Segoe UI","微軟正黑體",sans-serif;
    background: #eef2f6;
    margin: 0;
}

/* 🔥 超大 LOGO 版頂部 */
.header {
    background: linear-gradient(90deg, #0f2a44, #1a73e8);
    color: white;
    padding: 80px 20px 40px 20px; /* 上方留白更多 */
    text-align: center;
}

.logo-large {
    width: 350px; /* 超大 LOGO，像官網比例 */
    height: auto;
    margin-bottom: 20px;
    filter: drop-shadow(0 8px 25px rgba(0,0,0,0.5));
}

.company-name {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* 主容器 */
.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

/* 查詢面板 */
.search-panel {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    margin-bottom: 30px;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    font-size: 28px;
    color: #333;
}

.time {
    color: #555;
    margin-bottom: 20px;
    font-size: 16px;
}

/* 查詢區 */
.search-box {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

input[type="text"] {
    padding: 14px;
    font-size: 18px;
    width: 350px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn {
    padding: 14px 22px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
}

.btn-search {
    background: #1a73e8;
    color: white;
}
.btn-search:hover {
    background: #0f5bd3;
}

.btn-clear {
    background: #ccc;
}
.btn-clear:hover {
    background: #aaa;
}

/* 時間軸 */
.timeline {
    border-left: 5px solid #1a73e8;
    margin-top: 25px;
    padding-left: 25px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card::before {
    content: "";
    position: absolute;
    left: -17px;
    top: 25px;
    width: 15px;
    height: 15px;
    background: #1a73e8;
    border-radius: 50%;
}

.card-title {
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 18px;
}

.card-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.card-label {
    color: #666;
    font-size: 16px;
}
.card-value {
    font-weight: 500;
    font-size: 16px;
}

/* 狀態顏色 */
.status-received { color: green; }
.status-exported { color: orange; }
.status-delivering { color: #ff6600; }
.status-signed { color: blue; }

.no-data {
    text-align: center;
    color: red;
    margin-top: 25px;
    font-size: 18px;
}

/* 手機響應 */
@media(max-width:600px){
    .logo-large {
        width: 180px;  /* 手機縮小 */
    }
    input[type="text"] {
        width: 100%;
    }
    .card-row {
        flex-direction: column;
        align-items: flex-start;
    }
}
</style>
</head>

<body>

<!-- 🔥 超大 LOGO 官網比例 -->
<div class="header">
    <img src="logo.png" class="logo-large">
    <div class="company-name">信天翁國際快遞</div>
</div>

<div class="container">

    <!-- 查詢區 -->
    <div class="search-panel">
        <h1>貨物追蹤查詢</h1>

        <div class="time">
            當前時間：<span id="current_time"></span>
        </div>

        <div class="search-box">
            <input type="text" id="uid" placeholder="請輸入提單號">
            <button class="btn btn-search" onclick="showHint(uid.value)">查詢</button>
            <button class="btn btn-clear" onclick="cleanAll()">清除</button>
        </div>
    </div>

    <!-- 查詢結果 -->
    <div id="order_status" class="timeline"></div>

</div>

<script>
// 時間顯示
function updateTime(){
    document.getElementById("current_time").innerText =
        new Date().toLocaleString();
}
setInterval(updateTime,1000);

// 查詢
function showHint(str){
    if(!str) return;

    var url="https://script.google.com/macros/s/AKfycbx1-2fSmyfjm1cTPMwqUoYAiWzsbgcmF8LJR0N7AMWWpCros3al47-yRqIrO9WaJI26/exec";

    fetch(url+"?uid="+encodeURIComponent(str))
    .then(res=>res.json())
    .then(obj=>{
        const container=document.getElementById("order_status");
        container.innerHTML="";

        if(obj.length===1){
            container.innerHTML='<div class="no-data">查無資料</div>';
            return;
        }

        for(let i=1;i<obj.length;i++){
            let card=document.createElement("div");
            card.className="card";

            let title=document.createElement("div");
            title.className="card-title";
            title.textContent="物流紀錄 #" + i;
            card.appendChild(title);

            for(let j=0;j<obj[0].data.length;j++){
                let row=document.createElement("div");
                row.className="card-row";

                let label=document.createElement("div");
                label.className="card-label";
                label.textContent=obj[0].data[j];

                let value=document.createElement("div");
                value.className="card-value";
                let cellValue=obj[i].data[j];

                if(cellValue.includes("已收貨")) value.className+=" status-received";
                else if(cellValue.includes("已出口")) value.className+=" status-exported";
                else if(cellValue.includes("派件中")) value.className+=" status-delivering";
                else if(cellValue.includes("簽收")) value.className+=" status-signed";

                value.textContent=cellValue;

                row.appendChild(label);
                row.appendChild(value);
                card.appendChild(row);
            }

            container.appendChild(card);
        }
    })
    .catch(()=>{
        document.getElementById("order_status").innerHTML =
            '<div class="no-data">資料讀取失敗</div>';
    });
}

// 清除
function cleanAll(){
    document.getElementById("order_status").innerHTML="";
    document.getElementById("uid").value="";
}
</script>

</body>
</html>
